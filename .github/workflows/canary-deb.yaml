name: Deb Canary

on:
  # This workflow will run from the release-automation.yaml automation on each merge
  workflow_dispatch:
    inputs:
      ref_name:
        required: true
        type: string
  workflow_call:
    inputs:
      ref_name:
        required: true
        type: string

  # This workflow runs hourly and performs 6 checks (every 10 min) within each run
  schedule:
    - cron: '0 * * * *'
  
  # This workflow will run when the workflow file is updated
  pull_request:
    paths:
      - '.github/workflows/canary-deb.yaml'
      - 'scripts/canary-deb.sh'
  
jobs:
  canary-deb:
    name: Test Finch APT repo health
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout canary script
        uses: actions/checkout@v6.0.1
        with:
          sparse-checkout: |
            scripts/canary-deb.sh
      - name: Run canary script (6 checks over ~55 minutes)
        run: ./scripts/canary-deb.sh
