name: Build, test and upload .deb to S3

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref_name:
        required: true
        type: string
  workflow_call:
    inputs:
      ref_name:
        required: true
        type: string
  schedule:
    - cron: '0 9 * * *'
env:
  GO111MODULE: on
  GO_VERSION: '1.23.8'

jobs:
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      runner-labels: ${{ toJSON(matrix.runner-labels) }}
    strategy:
      matrix:
        runner-labels:
          - self-hosted-x86: codebuild-finch-x86_64-2-instance-${{ github.run_id }}-${{ github.run_attempt }}-ubuntu-7.0-medium
            self-hosted-arm64: codebuild-finch-arm64-2-instance-${{ github.run_id }}-${{ github.run_attempt }}-ubuntu-7.0-medium
    steps:
      - name: Dump Config
        run: echo '${{ toJSON(matrix) }}'

  get-tag-name:
    name: Get tag name
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.check-tag.outputs.tag }}
      version: ${{ steps.check-tag.outputs.version }}
    steps:
      - name: Check tag from workflow input and github ref
        id: check-tag
        run: |
          if [ -n "${{ inputs.ref_name }}" ]; then
            tag=${{ inputs.ref_name }}
          else
            tag=${{ github.ref_name }}
          fi
          echo "tag=$tag" >> ${GITHUB_OUTPUT}

          version=${tag#v}
          if [[ $version =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version matches format: $version"
          else
            echo "Version $version doesn't match format. Using test version: 0.0.1"
            version="0.0.1"
          fi
          echo "version=$version" >> ${GITHUB_OUTPUT}
          
  ubuntu-deb-build:
    needs:
      - get-tag-name
      - setup
    runs-on: ${{ fromJSON(needs.setup.outputs.runner-labels)[matrix.os] }}
    timeout-minutes: 100
    strategy:
      matrix:
        os: ['self-hosted-x86', 'self-hosted-arm64']
    steps:
        - name: Clean ubuntu runner workspace
          run: |
            rm -rf ${{ github.workspace }}/*
        - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
          with:
            ref: ${{ inputs.tag }}
            fetch-depth: 0
            persist-credentials: false
            submodules: true
        - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
          with:
            go-version: ${{ env.GO_VERSION }}
            cache: false
        - name: configure aws credentials
          uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
          with:
            role-to-assume: ${{ secrets.WINDOWS_ROLE }}
            role-session-name: windows-msi
            aws-region: ${{ secrets.WINDOWS_REGION }}
        - name: Build for Ubuntu ${{ inputs.output_arch }}
          run: |
            make FINCH_OS_IMAGE_LOCATION_ROOT=__INSTALLFOLDER__
        - name: Generate and download signed deb
          run: |
            $version="${{ needs.get-tag-name.outputs.version }}"
            $tag="${{ needs.get-tag-name.outputs.tag }}"
            $timestamp=[math]::truncate((Get-Date (Get-Date).ToUniversalTime() -UFormat "%s"))
            $unsignedDeb="Finch-$tag-$timestamp.deb"
            Write-Host "Upload unsigned deb: $unsignedDeb"

            aws s3 cp "./_output/deb/Finch-$version.deb" "${{ secrets.WINDOWS_UNSIGNED_BUCKET }}$unsignedMSI" --acl bucket-owner-full-control --no-progress

            Write-Host "Attemp to download signed deb"
            $retryCount = 0
            $maxRetries = 20
            $delay = 5

            while ($retryCount -lt $maxRetries) {
              Start-Sleep -Seconds $delay
              $signedMSI = aws s3 ls ${{ secrets.WINDOWS_SIGNED_BUCKET }} 2>&1 | Where-Object { $_ -match "$unsignedMSI" } | Sort-Object -Descending | Select-Object -First 1 | ForEach-Object { ($_ -split '\s+')[-1] }
              if ($signedMSI -and ($signedMSI -notlike "*An error occurred (404) when calling the HeadObject operation*")) {
                  try {
                      aws s3 cp "${{ secrets.WINDOWS_SIGNED_BUCKET }}$signedMSI" "./msi-builder/build/signed/Finch-$tag.msi"
                      break
                  } catch {
                      Write-Host "Error during copy: $_"
                  }
              } else {
                  $retryCount++
                  Write-Host "Unable to find the signed MSI or encountered an error. Retry $retryCount/$maxRetries..."
              }
            }

            if ($retryCount -eq $maxRetries) {
              throw "Failed after $maxRetries attempts."
            }
        - name: Remove Finch VM and Clean Up Previous Environment
          if: ${{ always() }}
          timeout-minutes: 2
          shell: pwsh
          run: |
            sudo apt uninstall finch -y

  deb-e2e-tests:
    needs:
      - get-tag-name
      - setup
    runs-on: ${{ fromJSON(needs.setup.outputs.runner-labels)[matrix.os] }}
    timeout-minutes: 100
    strategy:
      fail-fast: false
      matrix:
        os: ['self-hosted-x86', 'self-hosted-arm64']
    steps:
      - name: Clean ubuntu runner workspace
        run: |
          rm -rf ${{ github.workspace }}/*
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
          submodules: true
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          role-to-assume: ${{ secrets.WINDOWS_ROLE }}
          role-session-name: windows-msi
          aws-region: ${{ secrets.WINDOWS_REGION }}
      - name: Run VM e2e tests
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with: 
          timeout_minutes: 180
          max_attempts: 3
          command: |
            git status
            git clean -f -d
            make test-e2e-vm
      - name: Run container e2e tests
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with: 
          timeout_minutes: 180
          max_attempts: 3
          command: |
            git status
            git clean -f -d
            make test-e2e-container
      - name: Remove Finch VM and Clean Up Previous Environment
        if: ${{ always() }}
        timeout-minutes: 2
        shell: pwsh
        run: |
          sudo apt uninstall finch -y
